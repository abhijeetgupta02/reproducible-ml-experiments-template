# Main experiment configuration.
# Everything that influences a run lives here, version-controlled and copied
# into each run directory. Change values here -- not in code -- between runs.

seed: 0

# Where per-run directories (config + metrics + model) are written.
logging_dir: "logs/runs"

# Synthetic dataset parameters (scikit-learn make_classification).
data:
  n_samples: 2000
  n_features: 20
  n_informative: 10
  n_classes: 2
  val_size: 0.2      # fraction of full dataset used for validation
  test_size: 0.2     # fraction of full dataset held out for test
  random_state: 0

# Model + training hyperparameters (scikit-learn MLPClassifier).
model:
  hidden_layer_sizes: [64, 64]
  learning_rate_init: 0.001
  epochs: 50
  random_state: 0
